name: Bug Report
description: File a bug report to help us improve slash-agent
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., Environment variables exported by agent subshell do not sync back to Zsh parent shell...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior, including specific commands executed.
      placeholder: |
        1. Run `/agent export TEST_VAR=1`
        2. Exit agent session
        3. Run `echo $TEST_VAR` in parent shell
        4. See error or missing value
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected vs Actual Behavior
      description: Describe what you expected to happen, and what actually happened.
    validations:
      required: true
  - type: dropdown
    id: shell_type
    attributes:
      label: Shell Environment
      description: Which active shell or terminal multiplexer are you running slash-agent in?
      options:
        - Bash
        - Zsh
        - Fish
        - Ksh
        - tmux session (inside Bash/Zsh/Fish)
        - Other / WSL2
    validations:
      required: true
  - type: dropdown
    id: llm_backend
    attributes:
      label: LLM Backend Provider
      description: Which model provider backend adapter is configured?
      options:
        - Ollama (Local)
        - OpenAI API
        - Azure OpenAI
        - Other OpenAI-compatible API
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Additional Environment Details
      description: OS version, Python version, and slash-agent release version.
      placeholder: |
        - OS: Linux (Ubuntu 22.04) / macOS Sonoma / Windows WSL2
        - Python: 3.10.12
        - slash-agent: v0.1.2
    validations:
      required: false
